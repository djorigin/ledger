server {
    listen 80;
    server_name _;

    # CSV/OFX bank statement imports (apps.imports) can be larger than
    # nginx's 1MB default.
    client_max_body_size 10M;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /api/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /graphql/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Served directly from the shared staticfiles volume (populated by the
    # django container's collectstatic) -- not proxied through gunicorn.
    location /static/ {
        alias /app/staticfiles/;
    }

    # User-uploaded files (Inventory photos), served directly from a
    # shared volume written by the django container -- same pattern as
    # /static/ above, no proxying through gunicorn.
    location /media/ {
        alias /app/media/;
    }

    # SPA fallback: any path not matched above is a client-side route, not
    # a missing file -- let React Router handle it.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
